cgroup:
  autoMount:
    enabled: false
  hostRoot: /sys/fs/cgroup
ingressController:
  default: true
  enabled: true
  loadbalancerMode: shared
operator:
  replicas: 1
  rollOutPods: true
rollOutCiliumPods: true
k8sClientRateLimit:
  qps: 10
  burst: 40
l2announcements:
  enabled: true
ipam:
  mode: kubernetes
gatewayAPI:
  enabled: true
socketLB:
  hostNamespaceOnly: true
k8sServiceHost: 192.168.1.29
k8sServicePort: 6443
kubeProxyReplacement: true
hubble:
  ui:
    enabled: false
  relay:
    enabled: false
envoy:
  enabled: false
resources:
  requests:
    cpu: 100m
    memory: 512Mi
  limits:
    memory: 512Mi
securityContext:
  capabilities:
    ciliumAgent:
    - CHOWN
    - KILL
    - NET_ADMIN
    - NET_RAW
    - IPC_LOCK
    - SYS_ADMIN
    - SYS_RESOURCE
    - DAC_OVERRIDE
    - FOWNER
    - SETGID
    - SETUID
    cleanCiliumState:
    - NET_ADMIN
    - SYS_ADMIN
    - SYS_RESOURCE

argoCD:
  syncOptions:
    - RespectIgnoreDifferences=true
    - ServerSideApply=true
  ignoreDifferences:
    - group: cilium.io
      kind: CiliumIdentity
      jsonPointers:
        - /spec
    - group: ""
      kind: Secret
      name: hubble-ca-cert
      jsonPointers:
        - /data
    - group: ""
      kind: Secret
      name: hubble-relay-client-certs
      jsonPointers:
        - /data
    - group: ""
      kind: Secret
      name: hubble-server-certs
      jsonPointers:
        - /data