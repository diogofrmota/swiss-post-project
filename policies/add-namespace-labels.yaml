# Automatically adds standard labels to every new Namespace.
apiVersion: kyverno.io/v1
kind: ClusterPolicy
metadata:
  name: add-namespace-labels
  annotations:
    argocd.argoproj.io/sync-wave: "5"
    policies.kyverno.io/title: Add Standard Namespace Labels
    policies.kyverno.io/category: Automation
    policies.kyverno.io/description: >-
      Mutates every new Namespace to add managed-by and environment labels,
      ensuring consistent labelling for policy targeting and observability.
spec:
  rules:
    - name: add-labels
      match:
        any:
          - resources:
              kinds:
                - Namespace
      mutate:
        patchStrategicMerge:
          metadata:
            labels:
              +(managed-by): gitops
              +(environment): production