# Rejects Pods that run any container in privileged mode.
apiVersion: kyverno.io/v1
kind: ClusterPolicy
metadata:
  name: disallow-privileged-containers
  annotations:
    argocd.argoproj.io/sync-wave: "5"
    policies.kyverno.io/title: Disallow Privileged Containers
    policies.kyverno.io/category: Pod Security
    policies.kyverno.io/description: >-
      Privileged containers can access host-level resources and break cluster isolation.
      This policy blocks any Pod where a container sets privileged: true.
      Uses a deny rule with JMESPath so that pods omitting securityContext
      entirely are not silently skipped.
spec:
  validationFailureAction: Enforce
  background: true
  rules:
    - name: check-privileged
      match:
        any:
          - resources:
              kinds:
                - Pod
      exclude:
        any:
          - resources:
              namespaces:
                - kube-system
                - kyverno
                - argocd
                - monitoring
                - metallb-system
                - cert-manager
      validate:
        message: "Privileged containers are not allowed."
        deny:
          conditions:
            any:
              - key: "{{ request.object.spec.containers[?securityContext.privileged == `true`] | length(@) }}"
                operator: GreaterThan
                value: 0
              - key: "{{ request.object.spec.[initContainers, ephemeralContainers][] | [?securityContext.privileged == `true`] | length(@) }}"
                operator: GreaterThan
                value: 0