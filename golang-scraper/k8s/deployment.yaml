apiVersion: apps/v1
kind: Deployment
metadata:
  name: golang-scraper
  namespace: golang-scraper
  labels:
    app: golang-scraper
spec:
  replicas: 1
  selector:
    matchLabels:
      app: golang-scraper
  template:
    metadata:
      labels:
        app: golang-scraper
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 65532
      containers:
        - name: scraper
          image: ghcr.io/diogofrmota/golang-scraper:latest
          imagePullPolicy: Always
          ports:
            - name: metrics
              containerPort: 8080
          livenessProbe:
            httpGet:
              path: /healthz
              port: metrics
            initialDelaySeconds: 10
            periodSeconds: 20
          readinessProbe:
            httpGet:
              path: /healthz
              port: metrics
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            requests:
              cpu: 20m
              memory: 32Mi
            limits:
              cpu: 100m
              memory: 64Mi
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL