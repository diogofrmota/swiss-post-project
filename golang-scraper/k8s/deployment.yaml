apiVersion: apps/v1
kind: Deployment
metadata:
  name: golang-scraper
  namespace: golang-scraper
  labels:
    app: golang-scraper
spec:
  replicas: 1
  selector:
    matchLabels:
      app: golang-scraper
  template:
    metadata:
      labels:
        app: golang-scraper
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 65532
      containers:
        - name: scraper
          # TODO: Consider pinning to a SHA-tagged image (e.g. ghcr.io/diogofrmota/golang-scraper:<sha>)
          # instead of :latest for reproducible deploys. The CI already pushes SHA tags.
          # You can use Renovate's docker manager or Argo CD Image Updater to automate bumps.
          image: ghcr.io/diogofrmota/golang-scraper:latest
          imagePullPolicy: Always
          ports:
            - name: metrics
              containerPort: 8080
          livenessProbe:
            httpGet:
              path: /healthz
              port: metrics
            initialDelaySeconds: 10
            periodSeconds: 20
          readinessProbe:
            httpGet:
              path: /healthz
              port: metrics
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            requests:
              cpu: 20m
              memory: 32Mi
            limits:
              cpu: 100m
              memory: 64Mi
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL