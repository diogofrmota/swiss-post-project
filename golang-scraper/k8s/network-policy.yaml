# Default deny all ingress and egress for the golang-scraper namespace.
#
# NOTE: Cilium network policies are ADDITIVE — having egress: [] here blocks
# all egress by default, but the allow-weather-api and allow-dns policies
# below open specific flows on top of this baseline. A pod's effective policy
# is the union of all matching CiliumNetworkPolicy objects.
apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: default-deny
  namespace: golang-scraper
spec:
  endpointSelector: {}
  ingress:
    # Allow kubelet probes (liveness and readiness)
    - fromEntities:
        - host
      toPorts:
        - ports:
            - port: "8080"
              protocol: TCP
  egress: []
---
# Allow egress to the Open-Meteo weather API (HTTPS)
apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: allow-weather-api
  namespace: golang-scraper
spec:
  endpointSelector:
    matchLabels:
      app: golang-scraper
  egress:
    - toFQDNs:
        - matchName: "api.open-meteo.com"
      toPorts:
        - ports:
            - port: "443"
              protocol: TCP
---
# Allow DNS resolution via CoreDNS (required for FQDN-based egress rules)
apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: allow-dns
  namespace: golang-scraper
spec:
  endpointSelector:
    matchLabels:
      app: golang-scraper
  egress:
    - toEndpoints:
        - matchLabels:
            k8s:io.kubernetes.pod.namespace: kube-system
            k8s:k8s-app: kube-dns
      toPorts:
        - ports:
            - port: "53"
              protocol: UDP
            - port: "53"
              protocol: TCP
          rules:
            dns:
              - matchPattern: "*"