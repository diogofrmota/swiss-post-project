apiVersion: argoproj.io/v1alpha1
kind: AppProject
metadata:
  name: infra
  namespace: argocd
  # Finalizer that ensures that project is not deleted until it is not referenced by any application
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  description: "Critical components"
  sourceRepos:
    - "https://github.com/diogofrmota/swiss-post-project"
  destinations:
    - namespace: '*'
      server: https://kubernetes.default.svc
  clusterResourceWhitelist:
    - group: '*'
      kind: '*'
  namespaceResourceWhitelist:
    - group: '*'
      kind: '*'
---
apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: infra
  namespace: argocd
spec:
  goTemplate: true
  goTemplateOptions: ["missingkey=error"]
  generators:
  - git:
      repoURL: https://github.com/diogofrmota/swiss-post-project
      revision: HEAD
      directories:
      - path: 'infra/cilium'
  template:
    metadata:
      name: '{{.path.basenameNormalized}}'
    spec:
      project: "infra"
      source:
        repoURL: https://github.com/diogofrmota/swiss-post-project
        targetRevision: HEAD
        path: '{{.path.path}}'
      destination:
        server: https://kubernetes.default.svc
        namespace: '{{.path.basenameNormalized}}'
      ignoreDifferences:
      - group: ""
        kind: Service
        name: cilium-ingress
        namespace: kube-system
        jsonPointers:
        - /spec/ports/0/nodePort
        - /spec/ports/1/nodePort
      - group: ""
        kind: Secret
        name: cilium-ca
        namespace: kube-system
        jsonPointers:
        - /data
      - group: ""
        kind: Secret
        name: hubble-server-certs
        namespace: kube-system
        jsonPointers:
        - /data
      syncPolicy:
        syncOptions:
        - CreateNamespace=true
        - PruneLast=true
        - PrunePropagationPolicy=foreground
        - Replace=false
        - PreserveResourcesOnDeletion=true