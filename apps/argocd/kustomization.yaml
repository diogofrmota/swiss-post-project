apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: argocd

resources:
- namespace.yaml
- https://raw.githubusercontent.com/argoproj/argo-cd/v3.3.6/manifests/install.yaml
- httproute.yaml
- appset-cilium.yaml
- appset-apps.yaml

configMapGenerator:
- name: argocd-cm
  behavior: merge
  literals:
  - kustomize.buildOptions=--enable-helm
- name: argocd-cmd-params-cm
  literals:
  - server.insecure=true
  behavior: merge