apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: argocd

resources:
- namespace.yaml
- https://raw.githubusercontent.com/argoproj/argo-cd/v3.3.6/manifests/install.yaml
- httproute.yaml
- appset-cilium.yaml
- appset-apps.yaml

configMapGenerator:
- name: argocd-cm
  behavior: merge
  literals:
  - kustomize.buildOptions=--enable-helm
- name: argocd-cmd-params-cm
  literals:
  - server.insecure=true
  behavior: merge

patches:
- patch: |-
    apiVersion: apps/v1
    kind: Deployment
    metadata:
      name: argocd-repo-server
    spec:
      replicas: 1
      template:
        spec:
          containers:
          - name: argocd-repo-server
            resources:
              requests:
                cpu: 50m
                memory: 64Mi
              limits:
                memory: 128Mi
  target:
    kind: Deployment
    name: argocd-repo-server
- patch: |-
    apiVersion: apps/v1
    kind: Deployment
    metadata:
      name: argocd-server
    spec:
      template:
        spec:
          containers:
          - name: argocd-server
            resources:
              requests:
                cpu: 50m
                memory: 64Mi
              limits:
                memory: 128Mi
  target:
    kind: Deployment
    name: argocd-server
- patch: |-
    apiVersion: apps/v1
    kind: Deployment
    metadata:
      name: argocd-application-controller
    spec:
      template:
        spec:
          containers:
          - name: argocd-application-controller
            resources:
              requests:
                cpu: 50m
                memory: 64Mi
              limits:
                memory: 128Mi
  target:
    kind: Deployment
    name: argocd-application-controller