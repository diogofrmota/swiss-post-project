apiVersion: v1
kind: Endpoints
metadata:
  name: node-exporter
  namespace: node-exporter
subsets:
- addresses:
  - ip: 192.168.1.29
    nodeName: k3s-master
  - ip: 192.168.1.31
    nodeName: k3s-worker-01
  - ip: 192.168.1.32
    nodeName: k3s-worker-02
  ports:
  - port: 9100
    name: metrics
    protocol: TCP