name: Renovate

on:
  schedule:
    - cron: "40 22 * * *"
  workflow_dispatch:

jobs:
  renovate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: renovatebot/github-action@v46.1.7
        with:
          token: ${{ secrets.RENOVATE_TOKEN }}
          configurationFile: renovate.json