name: Build and push scraper

on:
  push:
    branches: [main]
    paths:
      - golang-scraper/main.go
      - golang-scraper/go.mod
      - golang-scraper/Dockerfile

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Set up QEMU (arm64 cross-build)
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: golang-scraper
          platforms: linux/arm64
          push: true
          tags: |
            ghcr.io/diogofrmota/golang-scraper:latest
            ghcr.io/diogofrmota/golang-scraper:${{ github.sha }}