apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: root
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: https://github.com/diogofrmota/swiss-post-project
    targetRevision: HEAD
    path: applications
    kustomize: {}
  destination:
    server: https://kubernetes.default.svc
    namespace: argocd
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - SkipDryRunOnMissingResource=true   # lets CRDs (ClusterIssuer etc.) settle
    retry:
      limit: 5
      backoff:
        duration: 10s
        factor: 2
        maxDuration: 3m