# infrastructure/overlays/production/kustomization.yaml
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

bases:
  - ../../base

# Image tag is updated by the CI pipeline on every push to main
images:
  - name: ghcr.io/<YOUR_USERNAME>/custom-operator
    newTag: latest   # replaced with git SHA by GitHub Actions

patches:
  - path: replica-patch.yaml
  - path: resource-patch.yaml

resources:
  - crd.yaml
