apiVersion: apps/v1
kind: Deployment
metadata:
  name: custom-operator
  namespace: custom-operator
  labels:
    app: custom-operator
spec:
  replicas: 1
  selector:
    matchLabels:
      app: custom-operator
  template:
    metadata:
      labels:
        app: custom-operator
    spec:
      serviceAccountName: custom-operator
      securityContext:
        runAsNonRoot: true
        runAsUser: 65532
        fsGroup: 65532
      containers:
        - name: operator
          image: ghcr.io/diogofrmota/custom-operator:latest   # replaced by CI
          imagePullPolicy: Always
          ports:
            - name: metrics
              containerPort: 8080
            - name: health
              containerPort: 8081
          livenessProbe:
            httpGet:
              path: /healthz
              port: health
            initialDelaySeconds: 15
            periodSeconds: 20
          readinessProbe:
            httpGet:
              path: /readyz
              port: health
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 128Mi
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
      terminationGracePeriodSeconds: 10