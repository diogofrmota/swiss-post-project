apiVersion: v1
kind: ServiceAccount
metadata:
  name: custom-operator
  namespace: custom-operator
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: custom-operator
rules:
  - apiGroups: ["swisspost.io"]
    resources: ["appconfigs", "appconfigs/status", "appconfigs/finalizers"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  - apiGroups: ["apps"]
    resources: ["deployments"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  - apiGroups: [""]
    resources: ["configmaps", "secrets", "events"]
    verbs: ["get", "list", "watch", "create", "update", "patch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: custom-operator
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: custom-operator
subjects:
  - kind: ServiceAccount
    name: custom-operator
    namespace: custom-operator
---
apiVersion: v1
kind: Service
metadata:
  name: custom-operator-metrics
  namespace: custom-operator
  labels:
    app: custom-operator
spec:
  selector:
    app: custom-operator
  ports:
    - name: metrics
      port: 8080
      targetPort: metrics