apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: custom-operator
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/diogofrmota/swiss-post-project
    targetRevision: HEAD
    path: infrastructure/overlays/production
  destination:
    server: https://kubernetes.default.svc
    namespace: custom-operator
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true