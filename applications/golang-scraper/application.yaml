apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: golang-scraper
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/diogofrmota/swiss-post-project
    targetRevision: HEAD
    path: golang-scraper/k8s
  destination:
    server: https://kubernetes.default.svc
    namespace: golang-scraper
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true