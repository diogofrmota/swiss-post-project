apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: cilium
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "0"
spec:
  project: default
  source:
    repoURL: https://helm.cilium.io
    chart: cilium
    targetRevision: 1.19.2
    helm:
      valuesObject:
        # Replace kube-proxy entirely with eBPF
        kubeProxyReplacement: true
        k8sServiceHost: 192.168.1.29
        k8sServicePort: 6443

        # IPAM configuration to match k3s default podCIDR
        ipam:
          operator:
            clusterPoolIPv4PodCIDRList:
              - "10.42.0.0/16"

        # eBPF datapath
        bpf:
          masquerade: true

        # Cilium agent resources
        resources:
          requests:
            cpu: 50m
            memory: 100Mi
          limits:
            cpu: 300m
            memory: 256Mi

        # Cilium operator resources
        operator:
          replicas: 1
          resources:
            requests:
              cpu: 20m
              memory: 32Mi
            limits:
              cpu: 100m
              memory: 128Mi

        hubble:
          enabled: false

        # Ingress controller
        ingressController:
          enabled: true
          default: true
          loadbalancerMode: shared

        # LoadBalancer configuration (FIXED)
        loadBalancer:
          mode: snat  # Changed from dsr to snat - this was the critical fix!
          algorithm: maglev
          l2:
            announcements:
              enabled: true
            announcementsIPPool:
              - 192.168.1.200-192.168.1.220

  destination:
    server: https://kubernetes.default.svc
    namespace: kube-system
  syncPolicy:
    automated:
      prune: true
      selfHeal: true