apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: cilium
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "0"
spec:
  project: default
  source:
    repoURL: https://helm.cilium.io
    chart: cilium
    targetRevision: 1.15.3
    helm:
      valuesObject:
        # Replace kube-proxy entirely with eBPF
        kubeProxyReplacement: true
        k8sServiceHost: 192.168.1.29
        k8sServicePort: 6443

        # eBPF datapath
        bpf:
          masquerade: true

        # Cilium agent resources
        resources:
          requests:
            cpu: 100m
            memory: 128Mi
          limits:
            cpu: 500m
            memory: 512Mi

        # Cilium operator resources (missing previously — critical on 2GB Pi nodes)
        operator:
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 256Mi
          prometheus:
            enabled: true
            serviceMonitor:
              enabled: true
              labels:
                release: monitoring

        # Prometheus metrics
        prometheus:
          enabled: true
          serviceMonitor:
            enabled: true
            labels:
              release: monitoring

        # Hubble observability
        hubble:
          enabled: true
          metrics:
            enabled:
              - dns
              - drop
              - tcp
              - flow
              - icmp
              - httpV2:exemplars=true;labelsContext=source_ip,source_namespace,source_workload,destination_ip,destination_namespace,destination_workload,traffic_direction
            serviceMonitor:
              enabled: true
              labels:
                release: monitoring
          relay:
            enabled: true
            resources:
              requests:
                cpu: 50m
                memory: 64Mi
              limits:
                cpu: 200m
                memory: 256Mi
          ui:
            enabled: true
            resources:
              requests:
                cpu: 20m
                memory: 64Mi
              limits:
                cpu: 100m
                memory: 128Mi
            ingress:
              enabled: true
              className: cilium
              annotations:
                cert-manager.io/cluster-issuer: letsencrypt-prod
              hosts:
                - hubble.diogomota.com
              tls:
                - secretName: hubble-ui-tls
                  hosts:
                    - hubble.diogomota.com

        # Ingress controller (replaces Nginx)
        ingressController:
          enabled: true
          default: true
          loadbalancerMode: shared

  destination:
    server: https://kubernetes.default.svc
    namespace: kube-system
  syncPolicy:
    automated:
      prune: true
      selfHeal: true