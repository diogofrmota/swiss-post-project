apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: cilium
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://helm.cilium.io
    chart: cilium
    targetRevision: 1.15.3
    helm:
      valuesObject:
        # Replace kube-proxy entirely with eBPF
        kubeProxyReplacement: true
        k8sServiceHost: 192.168.1.29
        k8sServicePort: 6443

        # eBPF datapath
        bpf:
          masquerade: true

        # Hubble observability
        hubble:
          enabled: true
          relay:
            enabled: true
          ui:
            enabled: true
            ingress:
              enabled: true
              className: cilium
              annotations:
                cert-manager.io/cluster-issuer: letsencrypt-prod
              hosts:
                - hubble.diogomota.com
              tls:
                - secretName: hubble-ui-tls
                  hosts:
                    - hubble.diogomota.com

        # Ingress controller (replaces Nginx)
        ingressController:
          enabled: true
          default: true
          loadbalancerMode: shared

  destination:
    server: https://kubernetes.default.svc
    namespace: kube-system
  syncPolicy:
    automated:
      prune: true
      selfHeal: true