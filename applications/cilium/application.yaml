apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: cilium
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "0"
spec:
  project: default
  source:
    repoURL: https://helm.cilium.io
    chart: cilium
    targetRevision: 1.15.3
    helm:
      valuesObject:
        # Replace kube-proxy entirely with eBPF
        kubeProxyReplacement: true
        k8sServiceHost: 192.168.1.29
        k8sServicePort: 6443

        # eBPF datapath
        bpf:
          masquerade: true

        # Cilium agent resources (reduced for 2GB Pi)
        resources:
          requests:
            cpu: 50m
            memory: 100Mi
          limits:
            cpu: 300m
            memory: 256Mi

        # Cilium operator resources
        operator:
          resources:
            requests:
              cpu: 20m
              memory: 32Mi
            limits:
              cpu: 100m
              memory: 128Mi
          prometheus:
            enabled: true
            serviceMonitor:
              enabled: true
              labels:
                release: monitoring

        # Prometheus metrics
        prometheus:
          enabled: true
          serviceMonitor:
            enabled: true
            labels:
              release: monitoring

        # Hubble - metrics only, no UI or relay
        hubble:
          enabled: true
          metrics:
            enabled:
              - dns
              - drop
              - tcp
              - flow
            serviceMonitor:
              enabled: true
              labels:
                release: monitoring
          relay:
            enabled: false
          ui:
            enabled: false

        # Ingress controller (replaces Nginx)
        ingressController:
          enabled: true
          default: true
          loadbalancerMode: shared

  destination:
    server: https://kubernetes.default.svc
    namespace: kube-system
  syncPolicy:
    automated:
      prune: true
      selfHeal: true