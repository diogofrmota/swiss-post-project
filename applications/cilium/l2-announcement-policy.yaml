apiVersion: cilium.io/v2alpha1
kind: CiliumL2AnnouncementPolicy
metadata:
  name: home-l2-policy
  namespace: kube-system
  annotations:
    argocd.argoproj.io/sync-wave: "3"
spec:
  serviceSelector:
    matchLabels:
      # This will match services with the cilium-l2-announce label
      # You can also leave empty to match all LoadBalancer services
      cilium-l2-announce: "true"
  nodeSelector:
    matchLabels:
      # Announce from all nodes that have this label
      # You can add this label to specific nodes if needed
      kubernetes.io/os: linux
  interfaces:
    - eth0  # Adjust to your network interface
  externalIPs: true