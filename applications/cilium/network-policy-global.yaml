apiVersion: cilium.io/v2
kind: CiliumClusterwideNetworkPolicy
metadata:
  name: deny-cross-namespace
spec:
  # Apply to all pods except system namespaces that need cross-namespace access
  endpointSelector:
    matchExpressions:
      - key: k8s:io.kubernetes.pod.namespace
        operator: NotIn
        values:
          - kube-system
          - kyverno
          - argocd
          - monitoring
          - metallb-system
          - cert-manager
  ingress:
    - fromEndpoints:
        - matchExpressions:
            # Allow traffic only from pods in the same namespace
            - key: k8s:io.kubernetes.pod.namespace
              operator: In
              values: []   # Cilium resolves this to the endpoint's own namespace at runtime
  egress:
    # Allow egress to the Kubernetes API server
    - toEntities:
        - kube-apiserver
    # Allow DNS via CoreDNS
    - toEndpoints:
        - matchLabels:
            k8s:io.kubernetes.pod.namespace: kube-system
            k8s:k8s-app: kube-dns
      toPorts:
        - ports:
            - port: "53"
              protocol: UDP
            - port: "53"
              protocol: TCP


