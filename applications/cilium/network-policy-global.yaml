apiVersion: cilium.io/v2
kind: CiliumClusterwideNetworkPolicy
metadata:
  name: deny-cross-namespace
spec:
  endpointSelector:
    matchExpressions:
      - key: k8s:io.kubernetes.pod.namespace
        operator: NotIn
        values:
          - kube-system
          - kyverno
          - argocd
          - monitoring
          - metallb-system
          - cert-manager
  ingress:
    - fromEndpoints:
        - matchLabels:
            # Allow same-namespace traffic
            k8s:io.kubernetes.pod.namespace: ""   # resolved at runtime to own namespace
  egress:
    - toEntities:
        - kube-apiserver
    - toEndpoints:
        - matchLabels:
            k8s:io.kubernetes.pod.namespace: kube-system
            k8s:k8s-app: kube-dns
      toPorts:
        - ports:
            - port: "53"
              protocol: UDP
