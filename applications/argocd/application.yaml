apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: argocd
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "3"
spec:
  project: default
  source:
    repoURL: https://argoproj.github.io/argo-helm
    chart: argo-cd
    targetRevision: 9.4.15
    helm:
      valuesObject:
        global:
          domain: argocd.diogomota.com

        server:
          service:
            type: NodePort
            nodePortHttp: 30814
            nodePortHttps: 30662
          # Enable TLS with cert-manager
          ingress:
            enabled: false  # Keep false for NodePort
          # Configure TLS certificates
          certificate:
            enabled: true
            issuer:
              group: cert-manager.io
              kind: ClusterIssuer
              name: letsencrypt-prod
            secretName: argocd-server-tls
          # Enable TLS on the server
          extraArgs:
            - --insecure=false  # Disable insecure mode
          resources:
            requests:
              cpu: 25m
              memory: 64Mi
            limits:
              cpu: 150m
              memory: 192Mi
          # Mount the TLS certificate
          volumeMounts:
            - name: tls-certs
              mountPath: /app/config/tls
              readOnly: true
          volumes:
            - name: tls-certs
              secret:
                secretName: argocd-server-tls

        controller:
          resources:
            requests:
              cpu: 50m
              memory: 128Mi
            limits:
              cpu: 300m
              memory: 384Mi

        repoServer:
          resources:
            requests:
              cpu: 25m
              memory: 64Mi
            limits:
              cpu: 150m
              memory: 192Mi

        redis:
          resources:
            requests:
              cpu: 10m
              memory: 16Mi
            limits:
              cpu: 50m
              memory: 48Mi

        notifications:
          resources:
            requests:
              cpu: 5m
              memory: 16Mi
            limits:
              cpu: 25m
              memory: 48Mi

        applicationSet:
          resources:
            requests:
              cpu: 5m
              memory: 32Mi
            limits:
              cpu: 25m
              memory: 64Mi

        configs:
          params:
            server.insecure: false  # Disable insecure mode
            server.cert: /app/config/tls/tls.crt
            server.key: /app/config/tls/tls.key

  destination:
    server: https://kubernetes.default.svc
    namespace: argocd
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true