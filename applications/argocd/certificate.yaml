apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: argocd-server
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "2"
spec:
  secretName: argocd-server-tls
  duration: 2160h # 90 days
  renewBefore: 360h # 15 days
  issuerRef:
    name: letsencrypt-prod
    kind: ClusterIssuer
  commonName: argocd.diogomota.com
  dnsNames:
    - argocd.diogomota.com
    - argocd
    - argocd.argocd.svc.cluster.local
  privateKey:
    algorithm: RSA
    encoding: PKCS1
    size: 2048