apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: cert-manager
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "2"
spec:
  project: default
  source:
    repoURL: https://charts.jetstack.io
    chart: cert-manager
    targetRevision: v1.20.0
    helm:
      valuesObject:
        installCRDs: true
        resources:
          requests:
            cpu: 5m
            memory: 24Mi
          limits:
            cpu: 30m
            memory: 48Mi
        webhook:
          resources:
            requests:
              cpu: 5m
              memory: 16Mi
            limits:
              cpu: 30m
              memory: 48Mi
        cainjector:
          resources:
            requests:
              cpu: 5m
              memory: 24Mi
            limits:
              cpu: 30m
              memory: 48Mi
        startupapicheck:
          resources:
            requests:
              cpu: 5m
              memory: 16Mi
            limits:
              cpu: 30m
              memory: 48Mi
  destination:
    server: https://kubernetes.default.svc
    namespace: cert-manager
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true