apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: monitoring
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "3"
spec:
  project: default
  source:
    repoURL: https://prometheus-community.github.io/helm-charts
    chart: prometheus-node-exporter
    targetRevision: 4.37.3
    helm:
      valuesObject:
        resources:
          requests:
            cpu: 10m
            memory: 16Mi
          limits:
            cpu: 50m
            memory: 32Mi
        # hostPort exposes :9100 on each node IP so the
        # remote Prometheus can scrape <node-ip>:9100/metrics
        service:
          type: ClusterIP
          port: 9100
        hostPort:
          enabled: true
          port: 9100
        tolerations:
          - key: node-role.kubernetes.io/control-plane
            effect: NoSchedule
  destination:
    server: https://kubernetes.default.svc
    namespace: monitoring
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true