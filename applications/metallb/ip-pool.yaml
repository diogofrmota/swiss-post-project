apiVersion: metallb.io/v1beta1
kind: IPAddressPool
metadata:
  name: home-pool
  namespace: metallb-system
  annotations:
    argocd.argoproj.io/sync-wave: "3"
spec:
  addresses:
    - 192.168.1.200-192.168.1.220
---
apiVersion: metallb.io/v1beta1
kind: L2Advertisement
metadata:
  name: home-l2
  namespace: metallb-system
  annotations:
    argocd.argoproj.io/sync-wave: "3"
spec:
  ipAddressPools:
    - home-pool